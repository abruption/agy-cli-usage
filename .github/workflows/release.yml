name: Release

# Push a version tag to build, test, and publish to npm:
#   npm version patch   # bumps package.json + creates a v* tag
#   git push --follow-tags
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build, test & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --omit=optional
      - run: npm run check
      - run: npm test

      # Fail early if the tag (v1.2.3) doesn't match package.json version (1.2.3)
      - name: Verify tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version v$PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
